<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidneyCare</title>
    
    <!-- ใช้ // เพื่อป้องกันเบราว์เซอร์หรือโปรแกรมแปลง URL ผิดพลาด -->
    <script src="//cdn.tailwindcss.com"></script>
    <script charset="utf-8" src="//static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="//fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        .card-grid { 
           display: grid; 
           grid-template-columns: repeat(3, 1fr); 
           gap: 10px; 
           margin-bottom: 20px; 
        }
        .card { 
           background: white; border: 1px solid #e2e8f0; border-radius: 12px; 
           padding: 15px 5px; text-align: center; min-height: 130px;
        }
        .huge-num { font-size: 2.2rem; font-weight: 700; color: #0891b2; width: 100%; text-align: center; border: none; outline: none; background: transparent; }
        .bp-container { display: grid; grid-template-columns: 1fr 10px 1fr; align-items: center; color: #0891b2; font-weight: 700; }
        .bp-num { font-size: 1.6rem; width: 100%; border: none; outline: none; background: transparent; }
        
        .bottle-container { width: 60px; height: 100px; border: 3px solid #0891b2; border-radius: 5px 5px 15px 15px; position: relative; overflow: hidden; margin: 0 auto; }
        .water-level { position: absolute; bottom: 0; width: 100%; background-color: #22d3ee; transition: height 0.5s ease; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body class="p-4">
    <!-- หน้าจอโหลด -->
    <div id="loading" class="overlay">
        <div class="animate-spin rounded-full h-12 w-12 border-b-4 border-cyan-600 mb-4"></div>
        <p class="text-gray-600 font-bold text-lg">กำลังโหลดแอปพลิเคชัน...</p>
    </div>

    <!-- แอปพลิเคชันหลัก -->
    <div id="mainApp" class="max-w-md mx-auto hidden pb-10">
        <h1 class="text-2xl font-bold text-center mb-6 text-gray-800">📋 บันทึกสุขภาพประจำวัน</h1>
        <p class="font-semibold text-slate-700 mb-3 text-center">🚨 สัญญาณชีพ</p>
        
        <div class="card-grid">
        <!-- อุณหภูมิ -->
        <div class="card">
            <span class="card-title">อุณหภูมิ</span>
            <input type="number" id="temp" step="0.1" class="huge-num" placeholder="-">
            <span class="unit-text" style="font-size: 12px;" >องศาเซลเซียส</span>
        </div>
        <!-- ความดันโลหิต -->
        <div class="card">
           <span class="card-title">ความดันโลหิต</span>
           <div class="bp-container">
               <input type="number" id="sys" class="bp-num text-right" placeholder="บน">
               <span class="text-slate-300">/</span>
               <input type="number" id="dia" class="bp-num text-left" placeholder="ล่าง">
           </div>
         <span class="unit-text" style="font-size: 12px;" >มิลลิเมตรปรอท</span>
       </div>
    <!-- ชีพจร -->
       <div class="card">
          <span class="card-title">ชีพจร</span>
          <input type="number" id="pulse" class="huge-num" placeholder="-">
          <span class="unit-text" style="font-size: 12px;" >ครั้ง/นาที</span>
       </div>
     </div>
        
        <div class="card shadow-lg hover:shadow-xl transition-shadow duration-300 border border-slate-100 mb-6">
            <h2 class="font-semibold text-slate-700 text-center mb-3 text-center flex items-center justify-center gap-2">💧 ปริมาณน้ำที่จำกัด</h2>
            <div class="flex items-center gap-4">
                <div class="flex-1 space-y-2">
                    <input type="number" id="limitWater" placeholder="ปริมาณน้ำที่จำกัดต่อวัน" class="w-50 border p-2 rounded" oninput="calcWater()">
                    <input type="number" id="usedWater" class="w-50 border p-2 rounded" oninput="calcWater()" placeholder="ดื่มไปแล้ว">
                </div>
                <div class="flex flex-col items-center justify-center w-full">
                    <div class="bottle-container"><div id="waterLevel" class="water-level"></div></div>
                    <p class="text-[10px] mt-1 text-gray-500">เหลือ <span id="percentText">100</span>%</p>
                </div>
            </div>
            <div class="mt-3 text-center bg-blue-50 py-2 rounded-lg text-blue-700 font-bold text-2xl">คงเหลือ: <span id="remainWater">0</span> มล.</div>
        </div>

        <div class="card shadow-lg hover:shadow-xl transition-shadow duration-300 border border-slate-100">
            <h2 class="text-indigo-600 font-bold mb-3 flex items-center justify-center gap-2">🥪 น้ำหนักตัว</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input type="number" id="prevWeight" step="0.1" class="w-50 border p-2 rounded" oninput="calcIDWG()" placeholder="น้ำหนักแห้ง">
                <input type="number" id="currWeight" step="0.1" class="w-50 border p-2 rounded" oninput="calcIDWG()" placeholder="น้ำหนักก่อนฟอก">
            </div>
            <div class="text-center bg-indigo-50 py-2 rounded-lg text-indigo-700 font-bold text-2xl">
                น้ำหนักเพิ่มขึ้น: <span id="idwgResult"> 0% </span>
            </div>
        </div>
        
        <button id="btnSummarize" onclick="summarize()" class="w-full bg-cyan-600 text-white py-4 rounded-xl font-bold text-xl shadow-lg mt-6 active:scale-95 transition-transform">🔍 สรุปผลการตรวจ</button>

        <div id="summaryBox" class="card mt-4 hidden bg-yellow-50 border-2 border-yellow-200">
            <h3 class="font-bold text-lg mb-2 text-yellow-800">📋ผลการประเมิน</h3>
            <div id="summaryContent" class="text-sm space-y-2 text-gray-700 mb-4"></div>
            <button onclick="saveData()" id="btnSave" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold shadow-md active:scale-95 transition-transform">💾 บันทึกและส่งรายงานเข้า LINE</button>
        </div>
        <p class="text-center text-[10px] text-gray-400 mt-4 mb-8">ผู้ใช้งาน: <span id="userDisplay">...</span></p>
    </div>

    <script>
        // ==========================================
        // ⚙️ ตั้งค่าสำคัญ 2 จุด ก่อนเริ่มใช้งาน
        // ==========================================
        const MY_LIFF_ID = "2009546368-mX5qNfbN"; 
        
        const GAS_PREFIX = "https://";
        // นำ URL ของ Web App ตัด https:// ด้านหน้าออก แล้วมาวางที่ตัวแปรด้านล่าง
        const GAS_PATH = "script.google.com/macros/s/AKfycbxkpyMX3m61MS2aNyWBVSJF7JjMkTkqgR5xT25_i9YUjRPiZZoxbyZXsQzz2Px7SyHm/exec"; 
        const GAS_URL = GAS_PREFIX + GAS_PATH;
        // ==========================================

        let userId = ""; 
        let displayName = "";
        let currentIDWG = 0;

        async function initApp() {
            try {
                await liff.init({ liffId: MY_LIFF_ID });
                
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                userId = profile.userId;
                displayName = profile.displayName;
                document.getElementById('userDisplay').innerText = displayName;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('mainApp').classList.remove('hidden');
                calcWater(); 
            } catch (err) {
                alert("เกิดข้อผิดพลาดในการโหลด LINE: " + err.message);
            }
        }

        window.onload = initApp;

        function calcWater() {
            const limit = parseFloat(document.getElementById('limitWater').value) || 0;
            const used = parseFloat(document.getElementById('usedWater').value) || 0;
            const remain = limit - used;
            const percent = limit > 0 ? Math.max(0, (remain / limit) * 100) : 0;
            const waterEl = document.getElementById('waterLevel');
                if (percent <= 20) {
                    waterEl.classList.replace('bg-cyan-400', 'bg-red-400');
                } else {
                    waterEl.classList.replace('bg-red-400', 'bg-cyan-400');
        }
            document.getElementById('remainWater').innerText = Math.max(0, remain);
            document.getElementById('waterLevel').style.height = (percent > 100 ? 100 : percent) + '%';
            document.getElementById('percentText').innerText = Math.round(percent);
        }

        function calcIDWG() {
            const prev = parseFloat(document.getElementById('prevWeight').value) || 0;
            const curr = parseFloat(document.getElementById('currWeight').value) || 0;
            if (prev > 0) {
                currentIDWG = ((curr - prev) / prev) * 100;
                document.getElementById('idwgResult').innerText = currentIDWG.toFixed(1) + '%';
                document.getElementById('idwgResult').style.color = currentIDWG > 5 ? '#e11d48' : '#4f46e5';
            }
        }

        function summarize() {
            const temp = document.getElementById('temp').value || "-";
            const sys = parseInt(document.getElementById('sys').value) || 0;
            const dia = parseInt(document.getElementById('dia').value) || 0;
            const pulse = document.getElementById('pulse').value || "-";
            const remain = parseInt(document.getElementById('remainWater').innerText);
            
            let report = "";

            // 1. เงื่อนไขความดัน (Systolic / Diastolic)
            let bpStatus = "";
            if (sys >= 140 || dia >= 90) {
                bpStatus = "❌ <b>ความดันโลหิต:</b> สูงกว่าเกณฑ์ => ระวังอาการปวดศีรษะ คลื่นไส้อาเจียน ตาพร่ามัว ";
            } else if (sys < 90 || dia < 60) {
                bpStatus = "⚠️ <b>ความดันโลหิต:</b> ต่ำกว่าเกณฑ์ => ระวังอาการหน้ามืด เป็นลม ";
            } else {
                bpStatus = "✅ <b>ความดัน:</b> อยู่ในเกณฑ์ปกติ ";
            }
            report += bpStatus + "<br>";

            // 2. เงื่อนไขชีพจร (Pulse)
            let pulseVal = parseInt(pulse);
            let pulseStatus = "";
            if (pulse !== "-" && !isNaN(pulseVal)) {
            if (pulseVal > 100) {
                pulseStatus = "❌ <b>ชีพจร:</b> สูงกว่าเกณฑ์ => ระวังอาการใจสั่น หอบเหนื่อย แน่นหน้าอก ";
            } else if (pulseVal < 60) {
                pulseStatus = "⚠️ <b>ชีพจร:</b> ต่ำกว่าเกณฑ์ => ระวังอาการหน้ามืด เป็นลม อ่อนเพลีย ";
            } else {
                pulseStatus = "✅ <b>ชีพจร:</b> อยู่ในเกณฑ์ปกติ";
            }
            } else {
                pulseStatus = "❓ <b>ชีพจร:</b> ไม่ทราบข้อมูล";
            }
            report += pulseStatus + "<br>";

            // 3. เงื่อนไขอุณหภูมิ (Temperature)
            let tempVal = parseFloat(temp);
            if (tempVal > 37.4) {
                report += "❌ <b>อุณหภูมิ:</b> มีไข้ => ควรพักผ่อน เช็ดตัว และรับประทานยาลดไข้ <br>";
            } else if (tempVal < 36.5) {
                report += "⚠️ <b>อุณหภูมิ:</b> ต่ำ => ควรเพิ่มความอบอุ่นให้แก่ร่างกาย <br> ";
            } else {
                report += "✅ <b>อุณหภูมิ:</b> อยู่ในเกณฑ์ปกติ <br> ";
            }

            // 4. น้ำดื่ม (Remain)
            report += (remain <= 0) 
                ? "❌ <b>น้ำดื่ม:</b> เกินกำหนด! ไม่ควรดื่มเพิ่มเติม <br>" 
                : "✅ <b>น้ำดื่ม:</b> คงเหลือ " + remain + " มล. <br>";

            // 5. IDWG
            report += (currentIDWG > 5) 
                ? "❌ <b>IDWG:</b> สูงกว่าเกณฑ์ => ควรควบคุมน้ำหนักตัว " 
                :"✅ <b>IDWG:</b> อยู่ในเกณฑ์ปกติ ";
            
            const contentDiv = document.getElementById('summaryContent');
            contentDiv.innerHTML = report;
            contentDiv.style.textAlign = "left"; // บังคับชิดซ้าย
            contentDiv.style.padding = "10px 20px"; // เพิ่มพื้นที่ว่างรอบๆ ให้ดูสบายตาขึ้น
            document.getElementById('summaryBox').classList.remove('hidden');
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        async function saveData() {
            if (GAS_PATH.includes("xxxxxxxxxxxx")) {
                alert("กรุณาใส่ URL ของ Google Apps Script ในโค้ดก่อนทำการบันทึกครับ");
                return;
            }

            const btn = document.getElementById('btnSave');
            btn.disabled = true;
            btn.innerText = "⏳ กำลังบันทึกข้อมูลและส่งเข้า LINE...";

            const data = {
                userId: userId,
                userName: displayName,
                temp: document.getElementById('temp').value || "-",
                bp: (document.getElementById('sys').value || "-") + "/" + (document.getElementById('dia').value || "-"),
                pulse: document.getElementById('pulse').value || "-",
                remainWater: document.getElementById('remainWater').innerText,
                idwg: currentIDWG.toFixed(1) + "%"
            };

            try {
                // เรียกใช้ Google Apps Script แบบ API
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    document.body.innerHTML = '<div style="display:flex; height:100vh; align-items:center; justify-content:center; flex-direction:column; background-color:#f0fdf4; font-family:Kanit,sans-serif;"><h1 style="font-size:60px; margin:0;">✅</h1><h2 style="color:#166534; margin-top:15px; font-size:24px;">บันทึกข้อมูลสำเร็จ!</h2><p style="color:#15803d; font-size:14px; margin-top:8px;">ระบบกำลังปิดหน้าต่างอัตโนมัติ...</p></div>';
                    
                    setTimeout(() => { liff.closeWindow(); }, 2000);
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                alert("❌ เกิดข้อผิดพลาดในการส่งข้อมูล: " + error.message);
                btn.disabled = false;
                btn.innerText = "💾 บันทึกและส่งรายงานเข้า LINE";
            }
        }
    </script>
</body>
</html>
